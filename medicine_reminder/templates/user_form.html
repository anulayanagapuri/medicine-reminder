{% extends "base.html" %}
{% block title %}{{ 'Edit' if action == 'edit' else 'Add' }} User Â· Admin{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>{{ 'Edit User' if action == 'edit' else 'Add User' }}</h1>
  <form method="post"
        action="{{ url_for('edit_user', user_id=user_id) if action == 'edit' else url_for('add_user') }}">

    <label>Username *
      {% if action == 'edit' %}
        <input type="text" value="{{ form.username }}" disabled />
      {% else %}
        <input type="text" name="username" value="{{ form.username or '' }}" required />
      {% endif %}
    </label>

    <label>Password {{ '(leave blank to keep current)' if action == 'edit' else '*' }}
      <input type="password" name="password" {{ '' if action == 'edit' else 'required' }} />
    </label>

    <label>Full name
      <input type="text" name="full_name" value="{{ form.full_name or '' }}" />
    </label>

    <label>Email
      <input type="email" name="email" value="{{ form.email or '' }}" />
    </label>

    <label>Phone (e.g. +14155551234)
      <input type="text" name="phone" value="{{ form.phone or '' }}" />
    </label>

    <label class="check">
      <input type="checkbox" name="sms_enabled" {{ 'checked' if form.sms_enabled else '' }} />
      Account-level SMS enabled
    </label>

    <label class="check">
      <input type="checkbox" name="is_admin" {{ 'checked' if form.is_admin else '' }} />
      Administrator
    </label>

    <button type="submit" class="btn primary">{{ 'Save changes' if action == 'edit' else 'Create user' }}</button>
    <a href="{{ url_for('users_list') }}" class="btn ghost">Cancel</a>
  </form>
</div>
{% endblock %}
